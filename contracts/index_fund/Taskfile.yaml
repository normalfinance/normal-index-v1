version: '3'
tasks:
  clean:
    cmd: cargo clean

  fmt:
    cmd: cargo fmt --all

  check:
    cmd: cargo check

  build:
    cmds:
      - soroban contract build --package index_fund
      - soroban contract optimize --wasm ../../target/wasm32v1-none/release/index_fund.wasm --wasm-out ../../target/wasm32v1-none/release/index_fund.wasm
      - cp ../../target/wasm32v1-none/release/index_fund.wasm ../../wasm/index_fund.wasm

  test:
    deps:
      - build
    cmd: cargo test

  test_slow:
    cmds:
      - task: test

  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: check
      - task: test
