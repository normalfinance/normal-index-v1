version: '3'
tasks:
  clean:
    cmd: cargo clean

  fmt:
    cmd: cargo fmt --all

  check:
    cmd: cargo check

  build:
    cmds:
      - soroban contract build --package normal_adapter
      - soroban contract optimize --wasm ../../target/wasm32v1-none/release/normal_adapter.wasm --wasm-out ../../target/wasm32v1-none/release/normal_adapter.wasm
      - cp ../../target/wasm32v1-none/release/normal_adapter.wasm ../../wasm/normal_adapter.wasm

  test:
    deps:
      - build
    cmds:
      - cargo test

  test_slow:
    cmds:
      - task: test

  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: check
      - task: test
