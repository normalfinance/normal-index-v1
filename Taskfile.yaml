version: "3"

env:
  SUBDIRS:
    sh: dirname $(find . -mindepth 3 -maxdepth 3 -type f -name Taskfile.yaml)

tasks:
  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: test

  build:
    cmds:
      - task -d contracts/swap_utility build || exit 1
      - task -d contracts/index build || exit 1
      - task -d contracts/index_factory build || exit 1
      - cp ./target/wasm32v1-none/release/*.wasm ./wasm

  test:
    cmds:
      - for: { var: SUBDIRS }
        cmd: task -d {{ .ITEM }} test || exit 1

  test_slow:
    cmds:
      - for: { var: SUBDIRS }
        cmd: task -d {{ .ITEM }} test_slow || exit 1

  fmt:
    cmds:
      - for: { var: SUBDIRS }
        cmd: task -d {{ .ITEM }} fmt || exit 1

  clean:
    cmds:
      - for: { var: SUBDIRS }
        cmd: task -d {{ .ITEM }} clean || exit 1

  _check_bindings_tranfer_ownership:
    vars:
      WASMS:
        sh: find ./target/wasm32v1-none/release/ -maxdepth 1 -type f -name '*.wasm'
    cmds:
      - for: { var: WASMS }
        cmd: echo "Checking bindings for {{ .ITEM }}" &&
          soroban contract info interface --wasm {{ .ITEM }} | grep commit_transfer_ownership &&
          soroban contract info interface --wasm {{ .ITEM }} | grep apply_transfer_ownership
          || exit 1

  _check_bindings_delayed_upgrade:
    vars:
      WASMS:
        sh: find ./target/wasm32v1-none/release/ -maxdepth 1 -type f
    cmds:
      - for: { var: WASMS }
        cmd: echo "Checking bindings for {{ .ITEM }}" &&
          soroban contract info interface --wasm {{ .ITEM }} | grep apply_upgrade &&
          soroban contract info interface --wasm {{ .ITEM }} | grep commit_upgrade
          || exit 1

  check_bindings:
    cmds:
      - task build
      - task _check_bindings_tranfer_ownership
      - task _check_bindings_delayed_upgrade
